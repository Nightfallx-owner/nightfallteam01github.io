<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Products</title>
<style>
body{font-family:Arial;margin:0;background:#fff}
header{padding:14px;display:flex;justify-content:space-between;box-shadow:0 4px 10px rgba(0,0,0,.08)}
.logo{color:#2e7d32;font-weight:900}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:15px;padding:20px}
.card{border:1px solid #eee;border-radius:14px;overflow:hidden}
.card img{width:100%;height:150px;object-fit:cover}
.info{padding:10px}
button{background:#2e7d32;color:#fff;border:none;padding:8px;border-radius:10px;width:100%}
.cartBtn{position:fixed;bottom:20px;right:20px;background:#2e7d32;color:#fff;padding:14px 18px;border-radius:50px;cursor:pointer}
</style>
</head>
<body>

<header>
<div class="logo">BSJ PRODUCTS</div>
<nav>
<a href="index.html">Home</a>
<a href="features.html">Features</a>
<a href="about.html">About</a>
</nav>
</header>

<div class="grid" id="list"></div>

<div class="cartBtn" onclick="showCart()">🛒 Cart</div>

<script>
const products=[
{name:"Green Bowl",img:"https://images.unsplash.com/photo-1551892374",price:6},
{name:"Smoothie",img:"https://images.unsplash.com/photo-1553530666",price:4},
{name:"Chicken Meal",img:"https://images.unsplash.com/photo-1604908177522",price:9},
{name:"Avocado Toast",img:"https://images.unsplash.com/photo-1551183053",price:5},
{name:"Fruit Mix",img:"https://images.unsplash.com/photo-1547516508",price:5},
{name:"Protein Bowl",img:"https://images.unsplash.com/photo-1601312371429",price:10}
];

let cart=[];

function render(){
document.getElementById("list").innerHTML=
products.map((p,i)=>`
<div class="card">
<img src="${p.img}">
<div class="info">
<h3>${p.name}</h3>
<p>$${p.price}</p>
<button onclick="add(${i})">Add to Cart</button>
</div>
</div>
`).join("");
}

function add(i){
cart.push(products[i]);
alert(products[i].name + " added");
}

function showCart(){
alert("Cart items: " + cart.length);
}

render();
</script>

</body>
</html>
