<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>BSJ Daily Healthy AI PRO</title>

<style>
:root{
--bg:#f5f7f5;
--card:#ffffff;
--text:#111;
--primary:#2e7d32;
--shadow:0 8px 20px rgba(0,0,0,.08);
}

body.dark{
--bg:#0f1110;
--card:#1c1f1d;
--text:#fff;
--primary:#66bb6a;
--shadow:0 8px 22px rgba(0,0,0,.35);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:var(--bg);
color:var(--text);
transition:.25s;
}

header{
position:sticky;
top:0;
z-index:50;
background:var(--card);
padding:14px;
display:flex;
justify-content:space-between;
align-items:center;
gap:10px;
flex-wrap:wrap;
box-shadow:var(--shadow);
}

.logo{
font-size:26px;
font-weight:900;
color:var(--primary);
}

.right{
display:flex;
gap:8px;
flex-wrap:wrap;
}

input.search{
padding:10px;
border-radius:10px;
border:1px solid #ccc;
width:180px;
outline:none;
}

button{
border:none;
cursor:pointer;
border-radius:10px;
padding:10px 12px;
font-weight:700;
background:var(--primary);
color:#fff;
}

.hero{
padding:24px;
display:grid;
grid-template-columns:2fr 1fr;
gap:15px;
}

.banner{
background:linear-gradient(135deg,#2e7d32,#66bb6a);
color:#fff;
padding:24px;
border-radius:18px;
}

.side{
background:var(--card);
border-radius:18px;
padding:18px;
box-shadow:var(--shadow);
}

.section{
padding:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(210px,1fr));
gap:14px;
}

.card{
background:var(--card);
border-radius:16px;
overflow:hidden;
box-shadow:var(--shadow);
transition:.2s;
}

.card:hover{
transform:translateY(-4px);
}

.card img{
width:100%;
height:150px;
object-fit:cover;
background:#eee;
}

.info{
padding:12px;
}

.title{
font-size:18px;
font-weight:800;
margin-bottom:6px;
}

.meta{
font-size:13px;
opacity:.75;
margin-bottom:8px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
gap:8px;
margin-top:10px;
}

.price{
font-weight:900;
color:var(--primary);
}

.drawer{
position:fixed;
right:-390px;
top:0;
width:350px;
max-width:100%;
height:100%;
background:var(--card);
box-shadow:-8px 0 22px rgba(0,0,0,.18);
transition:.3s;
padding:18px;
overflow:auto;
z-index:90;
}

.drawer.open{
right:0;
}

.item{
padding:10px 0;
border-bottom:1px solid #ddd;
display:flex;
justify-content:space-between;
gap:8px;
}

.small{
font-size:12px;
opacity:.7;
}

.total{
margin-top:14px;
font-size:18px;
font-weight:900;
}

.overlay,
.modal{
position:fixed;
inset:0;
background:rgba(0,0,0,.55);
display:none;
justify-content:center;
align-items:center;
z-index:100;
padding:16px;
}

.box{
background:var(--card);
border-radius:18px;
padding:18px;
width:420px;
max-width:100%;
max-height:90vh;
overflow:auto;
box-shadow:var(--shadow);
}

.box img{
width:100%;
height:220px;
object-fit:cover;
border-radius:14px;
margin-bottom:12px;
}

.history{
margin-top:10px;
}

.history div{
padding:8px 0;
border-bottom:1px solid #ddd;
font-size:14px;
}

@media(max-width:900px){
.hero{
grid-template-columns:1fr;
}
}
</style>
</head>
<body>

<header>
<div class="logo">BSJ</div>

<div class="right">
<input class="search" id="search" placeholder="Search food...">
<button onclick="toggleTheme()">🌙</button>
<button onclick="toggleCart()">Cart (<span id="count">0</span>)</button>
<button onclick="showHistory()">History</button>
</div>
</header>

<section class="hero">
<div class="banner">
<h1>Healthy Food Delivery</h1>
<p>Calories • Nutrition • Fast Order • Smart UI</p>
<br>
<button onclick="randomSuggest()">AI Suggest</button>
</div>

<div class="side">
<h3>Daily Tip</h3>
<p id="tip">Drink water and eat balanced meals.</p>
</div>
</section>

<section class="section">
<div class="grid" id="products"></div>
</section>

<!-- CART -->
<div class="drawer" id="drawer">
<h2>Your Cart</h2>
<div id="cart"></div>
<div class="total">Total: $<span id="total">0</span></div>
<br>
<button onclick="checkout()">Order Now</button>
</div>

<!-- PRODUCT VIEW -->
<div class="modal" id="viewModal">
<div class="box">
<img id="viewImg">
<h2 id="viewTitle"></h2>
<p id="viewDesc"></p>
<br>
<p><b>Calories:</b> <span id="viewCal"></span></p>
<p><b>Protein:</b> <span id="viewProtein"></span></p>
<p><b>Carbs:</b> <span id="viewCarbs"></span></p>
<p><b>Fat:</b> <span id="viewFat"></span></p>
<br>
<button onclick="closeView()">Close</button>
</div>
</div>

<!-- HISTORY -->
<div class="overlay" id="historyModal">
<div class="box">
<h2>Order History</h2>
<div class="history" id="historyList"></div>
<br>
<button onclick="closeHistory()">Close</button>
</div>
</div>

<script>
const products = [
{
id:1,
name:"Chicken Salad",
price:8,
cal:320,
protein:"28g",
carbs:"14g",
fat:"11g",
img:"https://images.unsplash.com/photo-1546793665-c74683f339c1?auto=format&fit=crop&w=800&q=80",
desc:"Fresh chicken with greens and healthy dressing."
},
{
id:2,
name:"Protein Bowl",
price:10,
cal:450,
protein:"35g",
carbs:"30g",
fat:"14g",
img:"https://images.unsplash.com/photo-1512621776951-a57141f2eefd?auto=format&fit=crop&w=800&q=80",
desc:"Rice, chicken, avocado and vegetables."
},
{
id:3,
name:"Fruit Mix",
price:7,
cal:240,
protein:"4g",
carbs:"52g",
fat:"1g",
img:"https://images.unsplash.com/photo-1490474418585-ba9bad8fd0ea?auto=format&fit=crop&w=800&q=80",
desc:"Mixed seasonal fruits full of vitamins."
},
{
id:4,
name:"Smoothie",
price:6,
cal:210,
protein:"9g",
carbs:"36g",
fat:"3g",
img:"https://images.unsplash.com/photo-1502741338009-cac2772e18bc?auto=format&fit=crop&w=800&q=80",
desc:"Banana berry smoothie energy drink."
},
{
id:5,
name:"Avocado Toast",
price:9,
cal:380,
protein:"12g",
carbs:"33g",
fat:"18g",
img:"https://images.unsplash.com/photo-1525351484163-7529414344d8?auto=format&fit=crop&w=800&q=80",
desc:"Whole grain toast with avocado."
},
{
id:6,
name:"Chicken Meal",
price:12,
cal:520,
protein:"42g",
carbs:"28g",
fat:"18g",
img:"https://images.unsplash.com/photo-1604908177522-402f994d58a6?auto=format&fit=crop&w=800&q=80",
desc:"Healthy grilled chicken meal plate."
}
];

let cart = JSON.parse(localStorage.getItem("bsj_cart") || "[]");

function render(list = products){
productsEl.innerHTML = list.map(p => `
<div class="card">
<img src="${p.img}">
<div class="info">
<div class="title">${p.name}</div>
<div class="meta">${p.cal} kcal • ${p.protein} protein</div>

<div class="row">
<div class="price">$${p.price}</div>
<button onclick="viewProduct(${p.id})">View</button>
</div>

<div class="row">
<button onclick="addCart(${p.id})">Add to Cart</button>
</div>
</div>
</div>
`).join("");
}

function addCart(id){
const item = cart.find(x => x.id === id);
if(item){
item.qty++;
}else{
cart.push({id, qty:1});
}
saveCart();
drawCart();
}

function saveCart(){
localStorage.setItem("bsj_cart", JSON.stringify(cart));
}

function drawCart(){
count.textContent = cart.reduce((a,b)=>a+b.qty,0);

cartEl.innerHTML = cart.map(i=>{
const p = products.find(x=>x.id===i.id);
return `
<div class="item">
<div>
<b>${p.name}</b>
<div class="small">${i.qty} x $${p.price}</div>
</div>
<div>$${p.price*i.qty}</div>
</div>`;
}).join("");

total.textContent = cart.reduce((a,b)=>{
const p = products.find(x=>x.id===b.id);
return a + p.price*b.qty;
},0);
}

function toggleCart(){
drawer.classList.toggle("open");
}

function viewProduct(id){
const p = products.find(x=>x.id===id);

viewImg.src = p.img;
viewTitle.textContent = p.name;
viewDesc.textContent = p.desc;
viewCal.textContent = p.cal + " kcal";
viewProtein.textContent = p.protein;
viewCarbs.textContent = p.carbs;
viewFat.textContent = p.fat;

viewModal.style.display = "flex";
}

function closeView(){
viewModal.style.display = "none";
}

function checkout(){
if(cart.length===0){
alert("Cart empty");
return;
}

const now = new Date().toLocaleString();

let history = JSON.parse(localStorage.getItem("bsj_history") || "[]");

history.unshift({
time: now,
items: cart.map(i=>{
const p = products.find(x=>x.id===i.id);
return p.name + " x" + i.qty;
}).join(", "),
total: total.textContent
});

localStorage.setItem("bsj_history", JSON.stringify(history));

cart = [];
saveCart();
drawCart();

alert("Order placed successfully 🚀");
drawer.classList.remove("open");
}

function showHistory(){
const history = JSON.parse(localStorage.getItem("bsj_history") || "[]");

historyList.innerHTML = history.length
? history.map(h=>`
<div>
<b>${h.time}</b><br>
${h.items}<br>
Total: $${h.total}
</div>`).join("")
: "<p>No orders yet.</p>";

historyModal.style.display="flex";
}

function closeHistory(){
historyModal.style.display="none";
}

function toggleTheme(){
document.body.classList.toggle("dark");
}

search.oninput = e=>{
const q = e.target.value.toLowerCase();
render(products.filter(p=>p.name.toLowerCase().includes(q)));
}

function randomSuggest(){
const p = products[Math.floor(Math.random()*products.length)];
alert("AI Suggests: " + p.name);
}

render();
drawCart();
</script>

</body>
</html>
