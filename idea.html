<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Progress Test</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#f4f7f5;
}

.container{
    max-width:800px;
    margin:auto;
    padding:30px;
}

.card{
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

h1{
    text-align:center;
    color:#2e7d32;
}

.question{
    font-size:24px;
    margin-bottom:25px;
    font-weight:bold;
}

.option{
    background:#f0f0f0;
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
    cursor:pointer;
    transition:0.3s;
}

.option:hover{
    background:#dcedc8;
}

.correct{
    background:#81c784 !important;
    color:white;
}

.wrong{
    background:#e57373 !important;
    color:white;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    background:#2e7d32;
    color:white;
    font-size:18px;
    cursor:pointer;
    margin-top:20px;
}

button:hover{
    background:#1b5e20;
}

#explanation{
    margin-top:20px;
    font-size:18px;
    line-height:1.7;
}

#scoreBox{
    text-align:center;
    font-size:28px;
    color:#1565c0;
}

.progress{
    width:100%;
    background:#ddd;
    border-radius:20px;
    overflow:hidden;
    margin-bottom:25px;
}

.progress-bar{
    height:20px;
    background:#2e7d32;
    width:0%;
    transition:0.4s;
}

</style>
</head>
<body>

<div class="container">

<div class="card">

<h1>Unit 3 Progress Test</h1>

<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>

<div id="quiz"></div>

<button id="nextBtn">Next</button>

<div id="explanation"></div>

</div>

</div>

<script>

const questions = [

{
question:"1. There are only ___ actors in that new play.",
options:["a few","a little","much","many"],
correct:0,
explanation:"'Actors' sanaladigan noun. Shuning uchun 'a few' ishlatiladi."
},

{
question:"2. Have you got ___ money with you?",
options:["many","few","much","some actors"],
correct:2,
explanation:"Money sanalmaydi. Uncountable noun uchun 'much' ishlatiladi."
},

{
question:"3. I must learn the ___.",
options:["soundtrack","script","research","actor"],
correct:1,
explanation:"Actor text yodlaydi. Shu uchun 'script' to‘g‘ri."
},

{
question:"4. Scientists are doing ___ into homework.",
options:["grades","research","music","actor"],
correct:1,
explanation:"'Do research' to‘g‘ri collocation hisoblanadi."
},

{
question:"5. I’m not keen ___ violent films.",
options:["with","at","on","to"],
correct:2,
explanation:"'Keen on' degan phrase ishlatiladi."
},

{
question:"6. She ___ to school every day.",
options:["go","goes","going","gone"],
correct:1,
explanation:"She = he/she/it. Present Simple’da 'goes' ishlatiladi."
},

{
question:"7. They ___ football yesterday.",
options:["play","played","playing","plays"],
correct:1,
explanation:"Yesterday = Past Simple. Shu uchun 'played'."
},

{
question:"8. We ___ TV now.",
options:["watch","watched","are watching","watches"],
correct:2,
explanation:"Now = Present Continuous."
}

];

let currentQuestion = 0;
let score = 0;

const quiz = document.getElementById("quiz");
const nextBtn = document.getElementById("nextBtn");
const explanation = document.getElementById("explanation");
const bar = document.getElementById("bar");

function loadQuestion(){

    explanation.innerHTML="";

    let q = questions[currentQuestion];

    let html = `
    <div class="question">${q.question}</div>
    `;

    q.options.forEach((option,index)=>{

        html += `
        <div class="option" onclick="selectOption(${index})">
        ${option}
        </div>
        `;
    });

    quiz.innerHTML = html;

    let progress = ((currentQuestion)/questions.length)*100;
    bar.style.width = progress + "%";
}

let answered = false;

function selectOption(index){

    if(answered) return;

    answered = true;

    let q = questions[currentQuestion];

    let options = document.querySelectorAll(".option");

    options.forEach((opt,i)=>{

        if(i === q.correct){
            opt.classList.add("correct");
        }

        if(i === index && i !== q.correct){
            opt.classList.add("wrong");
        }

    });

    if(index === q.correct){
        score++;
        explanation.innerHTML =
        "✅ To‘g‘ri!<br><br>" + q.explanation;
    }else{
        explanation.innerHTML =
        "❌ Xato!<br><br>" + q.explanation;
    }

}

nextBtn.onclick = ()=>{

    if(!answered) return;

    currentQuestion++;
    answered = false;

    if(currentQuestion < questions.length){

        loadQuestion();

    }else{

        bar.style.width = "100%";

        quiz.innerHTML = `
        <div id="scoreBox">
        Test Finished! <br><br>
        You got ${score} / ${questions.length}
        </div>
        `;

        nextBtn.style.display = "none";
        explanation.innerHTML = "";

    }

}

loadQuestion();

</script>

</body>
</html>
