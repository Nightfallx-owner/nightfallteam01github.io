<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Healthy Food Quiz</title>
<style>
body{
    font-family: Arial, sans-serif;
    background:#f2f7f3;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.quiz-box{
    background:white;
    padding:25px;
    border-radius:12px;
    width:400px;
    box-shadow:0 0 15px rgba(0,0,0,0.1);
    text-align:center;
}

h2{
    color:#2e7d32;
}

button{
    margin-top:10px;
    padding:10px 15px;
    border:none;
    border-radius:6px;
    cursor:pointer;
    background:#2e7d32;
    color:white;
}

button:hover{
    background:#1b5e20;
}

.option{
    display:block;
    margin:8px 0;
    padding:8px;
    background:#e8f5e9;
    border-radius:6px;
    cursor:pointer;
}

.option:hover{
    background:#c8e6c9;
}

#result{
    margin-top:10px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="quiz-box">
    <h2>Healthy Food Quiz</h2>
    <div id="question">Loading...</div>
    <div id="options"></div>
    <div id="result"></div>
    <button onclick="nextQuestion()">Next Question</button>
</div>

<script>
const quiz = [
    {
        q: "What is healthy food?",
        options: ["Junk food", "Nutritious food", "Candy", "Fast food"],
        answer: "Nutritious food"
    },
    {
        q: "Why is healthy food important?",
        options: ["It makes you tired", "It harms health", "It improves health", "It has no effect"],
        answer: "It improves health"
    },
    {
        q: "Which is a healthy drink?",
        options: ["Soda", "Water", "Energy drink", "Cola"],
        answer: "Water"
    },
    {
        q: "Fruits are...",
        options: ["Unhealthy", "Healthy", "Junk food", "Artificial"],
        answer: "Healthy"
    },
    {
        q: "Fast food is usually...",
        options: ["Healthy", "Nutritious", "Unhealthy", "Fresh"],
        answer: "Unhealthy"
    }
];

let index = 0;
let selected = "";

function loadQuestion(){
    let q = quiz[index];
    document.getElementById("question").innerText = q.q;

    let optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    document.getElementById("result").innerText = "";

    q.options.forEach(opt => {
        let btn = document.createElement("div");
        btn.className = "option";
        btn.innerText = opt;
        btn.onclick = () => {
            selected = opt;
            checkAnswer();
        };
        optionsDiv.appendChild(btn);
    });
}

function checkAnswer(){
    let correct = quiz[index].answer;
    if(selected === correct){
        document.getElementById("result").innerText = "Correct ✅";
        document.getElementById("result").style.color = "green";
    } else {
        document.getElementById("result").innerText = "Wrong ❌ Correct: " + correct;
        document.getElementById("result").style.color = "red";
    }
}

function nextQuestion(){
    index++;
    if(index >= quiz.length){
        index = 0;
    }
    loadQuestion();
}

loadQuestion();
</script>

</body>
</html>
