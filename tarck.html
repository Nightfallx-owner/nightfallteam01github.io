<!DOCTYPE html>
<html lang="en">
<head>

<title>BSJ Track Order</title>

<style>
:root{

button{

.map{
position:fixed;
inset:70px 0 0 0;
background:
linear-gradient(90deg,#dadada 0 8%,#ececec 8% 16%,#dadada 16% 24%,#ececec 24% 32%,#dadada 32% 40%,#ececec 40% 48%,#dadada 48% 56%,#ececec 56% 64%,#dadada 64% 72%,#ececec 72% 80%,#dadada 80% 88%,#ececec 88% 100%);
overflow:hidden;
}

<body>

<header>
<div class="logo">BSJ TRACK</div>
<button onclick="restartTrack()">Restart</button>
</header>

<div class="map">

<div class="street"></div>
<div class="line"></div>

<div class="store">🍴 Restaurant</div>
<div class="home">🏠 Home</div>

<div class="car" id="car">🚛</div>

<div class="arrived" id="arrived">
🎉 Delivered Successfully
</div>

<div class="panel">

<div class="status" id="status">Preparing your fresh order...</div>

<div class="small" id="info">
Our kitchen team is carefully packing your meal.
</div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div style="margin-top:14px" class="small">
Estimated wait time: 0.5 min
</div>

<div style="margin-top:12px;font-weight:700">
Rate your delivery
</div>

<div class="stars" id="stars" style="margin-top:6px">
<span onclick="rate(1)">☆</span>
<span onclick="rate(2)">☆</span>
<span onclick="rate(3)">☆</span>
<span onclick="rate(4)">☆</span>
<span onclick="rate(5)">☆</span>
</div>

<div class="small" id="rateText" style="margin-top:6px">
No rating selected yet
</div>

</div>
</div>

<script>
let pos=30;
let max=window.innerWidth-150;
let timer=null;

function speak(text){
try{
speechSynthesis.cancel();
let s=new SpeechSynthesisUtterance(text);
s.lang="en-US";
s.rate=1;
s.pitch=1.1;
speechSynthesis.speak(s);
}catch(e){}
}

function updateStatus(percent){

if(percent<15){
status.textContent="Preparing your delicious order...";
info.textContent="Chef is packing everything fresh for you.";
}

else if(percent<35){
status.textContent="Courier picked up your order";
info.textContent="Driver has left the restaurant safely.";
}

else if(percent<70){
status.textContent="Your order is on the way";
info.textContent="Courier is driving to your address now.";
}

else if(percent<95){
status.textContent="Almost at your door";
info.textContent="Please be ready. Arrival in moments.";
}

else{
status.textContent="Delivered successfully";
info.textContent="Enjoy your meal and have a great day!";
}

}

function startTrack(){

pos=30;
arrived.style.display="none";
car.style.left=pos+"px";
bar.style.width="0%";

speak("Hello. Your order has been confirmed.");

timer=setInterval(()=>{

if(pos>=max){
clearInterval(timer);
status.textContent="Delivered successfully";
info.textContent="Thank you for choosing BSJ Delivery.";
bar.style.width="100%";
arrived.style.display="block";
speak("Your order has arrived. Enjoy your meal.");
return;
}

pos+=4;
car.style.left=pos+"px";

let percent=Math.min(100,Math.round((pos/max)*100));
bar.style.width=percent+"%";

updateStatus(percent);

},120);

setTimeout(()=>speak("Your courier picked up the order."),2500);
setTimeout(()=>speak("Your courier is on the way."),6000);
setTimeout(()=>speak("Your courier is almost there."),9500);

}

function restartTrack(){
clearInterval(timer);
speechSynthesis.cancel();
startTrack();
}

function rate(n){

let stars=document.querySelectorAll("#stars span");

stars.forEach((s,i)=>{
s.textContent=i<n ? "★" : "☆";
});

let txt=[
"",
"Poor service",
"Average service",
"Good service",
"Very good service",
"Excellent service"
];

rateText.textContent=txt[n];
speak("Thank you for rating us " + n + " stars");

}

window.addEventListener("resize",()=>{
max=window.innerWidth-150;
});

startTrack();
</script>

</body>
</html>
