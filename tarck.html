<style>

/* 🌿 GREEN + WHITE THEME */
body{
background:#f3fff4 !important;
}

/* HEADER */
header{
background:#ffffff !important;
border-bottom:2px solid #d8f5dc;
}

.logo{
color:#2e7d32 !important;
}

/* MAP */
.map{
background:linear-gradient(180deg,#f6fff7,#e8f5e9) !important;
}

/* ROAD */
.road{
background:#2d2d2d !important;
}

/* STORE + HOME */
.store,.home{
background:#ffffff !important;
color:#2e7d32 !important;
border:2px solid #dff5e3;
}

/* PANEL */
.panel{
background:#ffffff !important;
color:#111 !important;
border:2px solid #dff5e3;
}

/* PROGRESS */
.progress{
background:#d8ead9 !important;
}

.bar{
background:#2e7d32 !important;
}

/* ARRIVED */
.arrived{
background:#ffffff !important;
color:#2e7d32 !important;
border:2px solid #dff5e3;
}

/* BUTTON */
button{
background:#2e7d32 !important;
color:#fff !important;
}

/* 🚚 CAR LIGHTS */
.car{
position:absolute;
filter:
drop-shadow(0 0 12px #ffffff)
drop-shadow(0 0 24px #a5ffb2)
drop-shadow(0 0 45px #7cff95);
}

/* 💡 FRONT LIGHT */
.car::after{
content:"";
position:absolute;
right:-25px;
top:28px;
width:90px;
height:20px;
background:linear-gradient(
90deg,
rgba(255,255,255,.95),
rgba(124,255,149,.55),
transparent
);
filter:blur(10px);
transform:rotate(-2deg);
animation:lightMove .8s infinite alternate;
}

/* ✨ LIGHT FLICKER */
@keyframes lightMove{
from{
opacity:.7;
transform:translateX(0) rotate(-2deg);
}
to{
opacity:1;
transform:translateX(8px) rotate(-1deg);
}
}

/* 🌧 RAIN GREEN LIGHT */
.drop{
background:linear-gradient(
transparent,
#b8ffcb
) !important;
opacity:.35;
}

/* 🎉 FINAL SCREEN */
.successBox{
background:#ffffff !important;
color:#2e7d32 !important;
border:2px solid #dff5e3;
}

.finalStars{
color:#2e7d32 !important;
text-shadow:
0 0 12px #8cff9d,
0 0 25px #8cff9d;
}

</style>
