<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightfall AI Cam</title>

<!-- TensorFlow + BodyPix -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix"></script>

<style>
body{
  margin:0;
  background:#000;
  color:#fff;
  text-align:center;
  font-family:Consolas;
}

canvas{
  border:1px solid #333;
  border-radius:10px;
  margin-top:20px;
}

button{
  margin:10px;
  padding:10px 20px;
  background:#111;
  color:#fff;
  border:1px solid #444;
  cursor:pointer;
}
</style>
</head>

<body>

<h2>🤖 Nightfall AI Virtual Background</h2>

<video id="video" autoplay playsinline style="display:none"></video>
<canvas id="canvas" width="640" height="360"></canvas><br>

<button onclick="start()">START AI CAM</button>
<button onclick="stop()">STOP</button>

<script>
let net;
let stream;
let running=false;

const video=document.getElementById("video");
const canvas=document.getElementById("canvas");
const ctx=canvas.getContext("2d");

// background image
const bg=new Image();
bg.src="https://images.unsplash.com/photo-1506744038136-46273834b3fb";

async function start(){
  net = await bodyPix.load({
    architecture:'MobileNetV1',
    outputStride:16,
    multiplier:0.75,
    quantBytes:2
  });

  stream = await navigator.mediaDevices.getUserMedia({video:true});
  video.srcObject = stream;

  running=true;
  render();
}

function stop(){
  running=false;
  stream.getTracks().forEach(t=>t.stop());
}

async function render(){
  if(!running) return;

  // segmentation
  const segmentation = await net.segmentPerson(video,{
    internalResolution:'medium',
    segmentationThreshold:0.7
  });

  const {data} = segmentation;
  const imgData = ctx.createImageData(canvas.width,canvas.height);

  // background draw
  ctx.drawImage(bg,0,0,canvas.width,canvas.height);
  const bgPixels = ctx.getImageData(0,0,canvas.width,canvas.height);

  // camera frame
  ctx.drawImage(video,0,0,canvas.width,canvas.height);
  const frame = ctx.getImageData(0,0,canvas.width,canvas.height);

  for(let i=0;i<data.length;i++){
    let n=i*4;

    if(data[i]===1){
      // odam
      imgData.data[n]=frame.data[n];
      imgData.data[n+1]=frame.data[n+1];
      imgData.data[n+2]=frame.data[n+2];
      imgData.data[n+3]=255;
    }else{
      // background
      imgData.data[n]=bgPixels.data[n];
      imgData.data[n+1]=bgPixels.data[n+1];
      imgData.data[n+2]=bgPixels.data[n+2];
      imgData.data[n+3]=255;
    }
  }

  ctx.putImageData(imgData,0,0);

  requestAnimationFrame(render);
}
</script>

</body>
</html>
