<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Food Girl</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050816;
color:white;
display:flex;
height:100vh;
}

/* CHAT */
.chat{
width:40%;
background:#0f172a;
display:flex;
flex-direction:column;
}

.header{
background:#0ea5e9;
padding:14px;
font-weight:bold;
text-align:center;
}

.messages{
flex:1;
padding:10px;
overflow:auto;
}

.msg{
margin:6px 0;
padding:10px;
border-radius:10px;
max-width:85%;
}

.user{background:#22c55e;color:black;margin-left:auto}
.ai{background:#1e293b}

/* input */
.input{
display:flex;
padding:10px;
background:#0b1220;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#111827;
color:white;
}

button{
margin-left:8px;
padding:10px;
border:none;
background:#0ea5e9;
border-radius:10px;
cursor:pointer;
}

/* AI SIDE */
.side{
flex:1;
display:flex;
justify-content:center;
align-items:center;
position:relative;
}

.girl{
width:300px;
animation:idle 3s infinite;
}

@keyframes idle{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

.talking{
animation:talk .2s infinite alternate;
}

@keyframes talk{
from{transform:translateY(-5px)}
to{transform:translateY(5px)}
}

.mouth{
position:absolute;
bottom:90px;
left:50%;
transform:translateX(-50%);
width:25px;
height:10px;
background:pink;
border-radius:10px;
}

.talking .mouth{
height:18px;
}

.status{
position:absolute;
bottom:20px;
left:20px;
font-size:14px;
opacity:.7;
}
</style>
</head>

<body>

<div class="chat">
<div class="header">= AI FOOD Info </div>

<div class="messages" id="chat"></div>

<div class="input">
<input id="input" placeholder="Write food name...">
<button onclick="send()">Send</button>
</div>
</div>

<div class="side">
<div id="girl" class="girl">
<img src="https://www.google.com/imgres?q=robot%20girl%20for%20frontend&imgurl=https%3A%2F%2Fwww.1999.co.jp%2Fitbig130%2F11302498b.jpg&imgrefurl=https%3A%2F%2Fwww.1999.co.jp%2Feng%2F11302498%3Fsrsltid%3DAfmBOoqXVaXXJpbIBKIAGJaA4StzJBc85e2aHaGs8FbTOWOUhGYgpXme&docid=QuEozD6rBuNTZM&tbnid=MAJNOTnh2zye5M&vet=12ahUKEwj60diospiUAxVAg_0HHXQNNss4ChCc8A56BAhUEAE..i&w=750&h=1000&hcb=2&itg=1&ved=2ahUKEwj60diospiUAxVAg_0HHXQNNss4ChCc8A56BAhUEAE" width="100%">
<div class="mouth"></div>
</div>
<div class="status" id="status">AI ready...</div>
</div>

<script>

const chat=document.getElementById("chat");
const input=document.getElementById("input");
const girl=document.getElementById("girl");
const statusBox=document.getElementById("status");

/* FOOD AI */
function ai(text){
text=text.toLowerCase();

if(text.includes("salad"))
return "🥗 Salad — vitaminlarga  boy, weight  loss uchun  ideal  food.";

if(text.includes("burger"))
return "🍔 Burger — tez energiya beradi, lekin ko‘p yesa healthy emas.";

if(text.includes("smoothie"))
return "🥤 Smoothie — meva + vitamin, juda healthy drink.";

if(text.includes("chicken"))
return "🍗 Chicken — protein manbai, gym uchun juda yaxshi.";

if(text.includes("avocado"))
return "🥑 Avocado — healthy fat, skin va energy uchun foydali.";

if(text.includes("rice"))
return "🍛 Rice — asosiy energy source, sportchilar uchun yaxshi.";

return "🤔 Bu food haqida aniq malumot yo‘q. Salad, burger, smoothie deb yozib ko‘r.";
}

/* add message */
function add(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
return d;
}

/* typing */
function type(el,text,i=0){
if(i<text.length){
el.innerText+=text[i];
setTimeout(()=>type(el,text,i+1),20);
}else{
girl.classList.remove("talking");
statusBox.innerText="AI ready...";
}
}

/* voice */
function speak(text){
speechSynthesis.cancel();
let s=new SpeechSynthesisUtterance(text);
speechSynthesis.speak(s);
}

/* send */
function send(){
let t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

let box=add("","ai");

setTimeout(()=>{

let res=ai(t);

girl.classList.add("talking");
statusBox.innerText="AI speaking...";

type(box,res);
speak(res);

},400);
}

/* welcome */
add("Salom 👋 Food haqida so‘rashing mumkin!", "ai");

</script>

</body>
</html>
