<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Food Robot Girl</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f3fff5;
display:flex;
height:100vh;
overflow:hidden;
}

/* CHAT */

.chat{
width:40%;
background:white;
display:flex;
flex-direction:column;
border-right:4px solid #22c55e;
}

/* HEADER */

.header{
background:#22c55e;
padding:16px;
font-size:24px;
font-weight:bold;
color:white;
text-align:center;
box-shadow:0 4px 10px rgba(0,0,0,.1);
}

/* MESSAGES */

.messages{
flex:1;
overflow:auto;
padding:15px;
background:#f0fff4;
}

.msg{
margin:10px 0;
padding:12px;
border-radius:14px;
max-width:85%;
font-size:15px;
line-height:1.5;
animation:fade .3s;
}

@keyframes fade{
from{
opacity:0;
transform:translateY(10px);
}
to{
opacity:1;
transform:translateY(0);
}
}

.user{
background:#22c55e;
color:white;
margin-left:auto;
}

.ai{
background:white;
border:2px solid #22c55e;
color:#111;
}

/* INPUT */

.input{
display:flex;
padding:12px;
background:white;
border-top:2px solid #22c55e;
}

input{
flex:1;
padding:12px;
border:none;
border-radius:12px;
background:#f3f4f6;
font-size:15px;
outline:none;
}

button{
margin-left:8px;
padding:12px 18px;
border:none;
background:#22c55e;
color:white;
border-radius:12px;
cursor:pointer;
font-weight:bold;
transition:.25s;
}

button:hover{
background:#15803d;
transform:scale(1.04);
}

/* RIGHT SIDE */

.side{
flex:1;
display:flex;
justify-content:center;
align-items:center;
position:relative;
background:linear-gradient(135deg,#ecfdf5,#dcfce7);
overflow:hidden;
}

/* ROBOT GIRL */

.girl{
width:320px;
height:320px;
border-radius:50%;
object-fit:cover;
border:8px solid #22c55e;
box-shadow:0 0 40px rgba(34,197,94,.4);
animation:idle 3s infinite;
transition:.2s;
}

@keyframes idle{
0%,100%{
transform:translateY(0px);
}
50%{
transform:translateY(-12px);
}
}

.talking{
animation:talk .2s infinite alternate;
}

@keyframes talk{
from{
transform:translateY(-4px);
}
to{
transform:translateY(6px);
}
}

/* STATUS */

.status{
position:absolute;
bottom:20px;
left:20px;
font-size:15px;
color:#166534;
font-weight:bold;
}

/* PRODUCTS PAGE */

.products{
display:none;
position:absolute;
inset:0;
background:#f0fff4;
overflow:auto;
padding:20px;
}

.products h2{
color:#15803d;
margin-bottom:20px;
font-size:30px;
}

.card{
background:white;
padding:16px;
margin-bottom:15px;
border-radius:16px;
border:2px solid #22c55e;
box-shadow:0 5px 12px rgba(0,0,0,.08);
transition:.25s;
}

.card:hover{
transform:scale(1.02);
}

.foodTitle{
font-size:22px;
font-weight:bold;
margin-bottom:8px;
color:#15803d;
}

.foodInfo{
font-size:14px;
line-height:1.6;
}

/* MOBILE */

@media(max-width:900px){

body{
flex-direction:column;
}

.chat{
width:100%;
height:55%;
}

.side{
height:45%;
}

.girl{
width:220px;
height:220px;
}

}

</style>
</head>

<body>

<!-- CHAT -->

<div class="chat" id="chatBox">

<div class="header">
🤖 AI FOOD ROBOT GIRL
</div>

<div class="messages" id="chat"></div>

<div class="input">

<input id="input"
placeholder="Write burger, pizza or /products">

<button onclick="send()">
Send
</button>

</div>

</div>

<!-- RIGHT SIDE -->

<div class="side">

<!-- ROBOT GIRL -->

<img class="girl"
id="girl"
src="https://images.unsplash.com/photo-1677442136019-21780ecad995?w=800">

<div class="status" id="status">
AI ready...
</div>

<!-- PRODUCTS -->

<div class="products" id="products">

<h2>🍔 FOOD PRODUCTS</h2>

<div id="foods"></div>

</div>

</div>

<script>

const chat=document.getElementById("chat");
const input=document.getElementById("input");
const girl=document.getElementById("girl");
const statusBox=document.getElementById("status");
const products=document.getElementById("products");
const foods=document.getElementById("foods");

/* FOOD AI DATABASE */

const foodData={

burger:{
text:"🍔 Burger contains around 500 calories. It gives protein, carbohydrates and energy. Beef burgers contain iron and vitamin B12. Too much fast food may increase fat and sugar levels.",
voice:"Burger contains protein iron and energy."
},

pizza:{
text:"🍕 Pizza contains around 700 calories. Cheese gives calcium and protein. Tomato sauce contains vitamin C and antioxidants.",
voice:"Pizza contains calcium protein and antioxidants."
},

salad:{
text:"🥗 Salad contains around 150 calories. Rich in vitamins A, C and fiber. Helps digestion and supports healthy skin.",
voice:"Salad is healthy and rich in vitamins."
},

chicken:{
text:"🍗 Chicken contains around 300 calories. High protein food for muscles and body growth.",
voice:"Chicken is rich in protein."
},

sushi:{
text:"🍣 Sushi contains omega 3 healthy oils for brain and heart health.",
voice:"Sushi contains healthy omega 3 oils."
},

steak:{
text:"🥩 Steak is rich in iron zinc and strong protein.",
voice:"Steak contains iron zinc and protein."
},

coffee:{
text:"☕ Coffee improves focus and energy because of caffeine.",
voice:"Coffee improves focus and energy."
},

fruit:{
text:"🍎 Fruits contain vitamins antioxidants and fiber.",
voice:"Fruits contain vitamins and fiber."
},

milkshake:{
text:"🥤 Milkshake gives calcium energy and sugar.",
voice:"Milkshake contains calcium and energy."
},

ramen:{
text:"🍜 Ramen gives carbohydrates and quick energy.",
voice:"Ramen contains carbohydrates."
},

taco:{
text:"🌮 Taco contains protein vegetables and carbohydrates together.",
voice:"Taco contains protein and vegetables."
},

fries:{
text:"🍟 Fries contain carbohydrates and fast energy.",
voice:"Fries contain carbohydrates."
},

smoothie:{
text:"🥤 Smoothies contain vitamins minerals and hydration.",
voice:"Smoothies contain vitamins and minerals."
},

cake:{
text:"🍰 Cake contains sugar energy and sweet carbohydrates.",
voice:"Cake contains sugar and energy."
},

donut:{
text:"🍩 Donuts contain sugar carbohydrates and quick energy.",
voice:"Donuts contain sugar and carbohydrates."
}

};

/* PRODUCTS */

const productList=[

["Burger","500 Calories • Protein • Energy"],
["Pizza","700 Calories • Calcium • Cheese"],
["Salad","150 Calories • Vitamins • Healthy"],
["Chicken Bowl","400 Calories • Protein"],
["Sushi","250 Calories • Omega 3"],
["Steak","650 Calories • Iron • Protein"],
["Fruit Bowl","200 Calories • Vitamins"],
["Milkshake","450 Calories • Energy"],
["Pancakes","350 Calories • Carbs"],
["Avocado Toast","300 Calories • Healthy Fats"],
["Fries","400 Calories • Carbs"],
["Taco","350 Calories • Protein"],
["Hot Dog","450 Calories • Fast Energy"],
["Smoothie","220 Calories • Vitamins"],
["Donut","500 Calories • Sugar"],
["Cake","600 Calories • Sweet Energy"],
["Ice Coffee","120 Calories • Caffeine"],
["Chicken Wrap","370 Calories • Protein"],
["Ramen","550 Calories • Noodles"],
["Fish Bowl","300 Calories • Omega 3"]

];

/* SHOW PRODUCTS */

foods.innerHTML=productList.map(x=>`

<div class="card">

<div class="foodTitle">
${x[0]}
</div>

<div class="foodInfo">
${x[1]}
</div>

</div>

`).join("");

/* ADD MESSAGE */

function add(text,type){

let d=document.createElement("div");

d.className="msg "+type;

d.innerText=text;

chat.appendChild(d);

chat.scrollTop=chat.scrollHeight;

return d;

}

/* TYPE EFFECT */

function type(el,text,i=0){

if(i<text.length){

el.innerText+=text[i];

setTimeout(()=>type(el,text,i+1),18);

}else{

girl.classList.remove("talking");

statusBox.innerText="AI ready...";

}

}

/* FEMALE AI VOICE */

function speak(text){

speechSynthesis.cancel();

let s=new SpeechSynthesisUtterance(text);

s.lang="en-US";

let voices=speechSynthesis.getVoices();

let female=

voices.find(v=>
v.name.toLowerCase().includes("zira") ||
v.name.toLowerCase().includes("samantha") ||
v.name.toLowerCase().includes("female")
);

if(female){
s.voice=female;
}

s.rate=1;
s.pitch=1.3;

speechSynthesis.speak(s);

}

/* AI RESPONSE */

function ai(text){

text=text.toLowerCase();

for(let key in foodData){

if(text.includes(key)){

return foodData[key];

}

}

return{

text:"🤖 I know burger, pizza, salad, sushi, steak, coffee, smoothies and fruits. Type /products to see the full food menu.",

voice:"Please try burger pizza salad sushi or steak."

};

}

/* OPEN PRODUCTS */

function openProducts(){

products.style.display="block";

}

/* SEND */

function send(){

let t=input.value.trim();

if(!t)return;

add(t,"user");

input.value="";

/* PRODUCTS COMMAND */

if(t=="/products"){

openProducts();

return;

}

let box=add("","ai");

setTimeout(()=>{

let res=ai(t);

girl.classList.add("talking");

statusBox.innerText="AI speaking...";

type(box,res.text);

speak(res.voice);

},400);

}

/* ENTER KEY */

input.addEventListener("keypress",e=>{

if(e.key==="Enter"){

send();

}

});

/* START MESSAGE */

add("🤖 Hello! I am your AI Food Robot Girl. Ask me about burger, pizza, sushi, steak or type /products.","ai");

</script>

</body>
</html>
