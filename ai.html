<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>AI Food Girl</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050816;
color:white;
display:flex;
height:100vh;
overflow:hidden;
}

/* CHAT */
.chat{
width:40%;
background:#0f172a;
display:flex;
flex-direction:column;
}

.header{
background:#0ea5e9;
padding:14px;
font-weight:bold;
text-align:center;
}

.messages{
flex:1;
padding:10px;
overflow:auto;
}

.msg{
margin:6px 0;
padding:10px;
border-radius:10px;
max-width:85%;
}

.user{background:#22c55e;color:black;margin-left:auto}
.ai{background:#1e293b}

/* input */
.input{
display:flex;
padding:10px;
background:#0b1220;
}

input{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#111827;
color:white;
}

button{
margin-left:8px;
padding:10px;
border:none;
background:#0ea5e9;
border-radius:10px;
cursor:pointer;
}

/* RIGHT SIDE */
.side{
flex:1;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
position:relative;
}

.girl{
width:260px;
animation:idle 3s infinite;
}

@keyframes idle{
0%,100%{transform:translateY(0)}
50%{transform:translateY(-10px)}
}

.talking{
animation:talk .2s infinite alternate;
}

@keyframes talk{
from{transform:translateY(-5px)}
to{transform:translateY(5px)}
}

.mouth{
position:absolute;
bottom:90px;
left:50%;
transform:translateX(-50%);
width:25px;
height:10px;
background:pink;
border-radius:10px;
}

.talking .mouth{
height:18px;
}

.status{
position:absolute;
bottom:20px;
left:20px;
font-size:14px;
opacity:.7;
}

/* PRODUCTS PAGE */
.products{
display:none;
width:100%;
padding:20px;
overflow:auto;
}

.card{
background:#111827;
padding:15px;
margin:10px;
border-radius:10px;
}
</style>
</head>

<body>

<!-- CHAT -->
<div class="chat" id="chatBox">
<div class="header"> AI FOOD GIRL</div>

<div class="messages" id="chat"></div>

<div class="input">
<input id="input" placeholder="Write food or /products">
<button onclick="send()">Send</button>
</div>
</div>

<!-- RIGHT SIDE -->
<div class="side" id="side">

<img class="girl" id="girl"
src="https://www.google.com/imgres?q=robot%20girl&imgurl=https%3A%2F%2Fimage.cdn2.seaart.me%2F2024-01-31%2Fcmt3ftte878c73dmb6r0%2F63d094c13f446f646adb97e830480ae3b4f9c35a_high.webp&imgrefurl=https%3A%2F%2Fwww.seaart.ai%2Fexplore%2Fdetail%2Fcmt3g55e878c739855pg&docid=txMBqrKNlauQnM&tbnid=qqsDB3owyqsYNM&vet=12ahUKEwj59ZG0uJiUAxUJ0gIHHVALHlA4HhCc8A56BAgZEAE..i&w=1344&h=2048&hcb=2&ved=2ahUKEwj59ZG0uJiUAxUJ0gIHHVALHlA4HhCc8A56BAgZEAE">

<div class="mouth"></div>
<div class="status" id="status">AI ready...</div>

<!-- PRODUCTS PAGE -->
<div class="products" id="products">
<h2>🍟 Products Menu</h2>

<div class="card">🍔 Burger — $5</div>
<div class="card">🍕 Pizza — $8</div>
<div class="card">🥤 Cola — $2</div>
<div class="card">🍟 Fries — $3</div>

</div>

</div>

<script>

const chat=document.getElementById("chat");
const input=document.getElementById("input");
const girl=document.getElementById("girl");
const statusBox=document.getElementById("status");
const products=document.getElementById("products");
const chatBox=document.getElementById("chatBox");

/* AI logic */
function ai(text){

if(text.includes("salad")) return "🥗 Salad healthy food.";
if(text.includes("burger")) return "🍔 Burger tasty but not too healthy.";
if(text.includes("pizza")) return "🍕 Pizza — very popular food.";
if(text.includes("chicken")) return "🍗 Chicken — protein source.";

return "🤔 Unknown food. Try burger, pizza, salad.";
}

/* add msg */
function add(text,type){
let d=document.createElement("div");
d.className="msg "+type;
d.innerText=text;
chat.appendChild(d);
chat.scrollTop=chat.scrollHeight;
return d;
}

/* typing effect */
function type(el,text,i=0){
if(i<text.length){
el.innerText+=text[i];
setTimeout(()=>type(el,text,i+1),25);
}else{
girl.classList.remove("talking");
statusBox.innerText="AI ready...";
}
}

/* voice */
function speak(text){
speechSynthesis.cancel();
let s=new SpeechSynthesisUtterance(text);
speechSynthesis.speak(s);
}

/* page switch */
function openProducts(){
chatBox.style.display="none";
products.style.display="block";
}

/* send */
function send(){
let t=input.value.trim();
if(!t)return;

add(t,"user");
input.value="";

/* /products command */
if(t=="/products"){
openProducts();
return;
}

let box=add("","ai");

setTimeout(()=>{
let res=ai(t);

girl.classList.add("talking");
statusBox.innerText="AI speaking...";

type(box,res);
speak(res);

},400);
}

/* start */
add("Salom 👋 Food yoz yoki /products yoz!", "ai");

</script>

</body>
</html>
