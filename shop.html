<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BITE</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{margin:0;font-family:Arial;background:#f4f6f8}

header{
position:sticky;top:0;
background:#fff;
display:flex;
justify-content:space-between;
padding:15px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
z-index:10;
}

.brand{font-weight:800;color:#2e7d32}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,.08);
}

img{width:100%;height:140px;object-fit:cover}

.content{padding:10px}

.title{font-weight:700}

.price{color:#2e7d32;font-weight:bold;margin:5px 0}

button{
border:none;
padding:8px;
border-radius:8px;
cursor:pointer;
width:100%;
}

.add{background:#111;color:#fff;margin-top:5px}

/* CART BAR */
.cartBar{
position:fixed;
bottom:0;
width:100%;
background:#111;
color:#fff;
display:flex;
justify-content:space-between;
padding:12px;
align-items:center;
}

.cartBtn{
background:#2e7d32;
color:#fff;
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="brand">One bite And Take more energy</div>
</header>

<div class="cards" id="list"></div>

<!-- CART BAR -->
<div class="cartBar">
<div>🛒<span id="count">0</span></div>
<div>💰Total: $<span id="total">0</span></div>
<button class="cartBtn" onclick="checkout()">CHECKOUT</button>
</div>

<script>

/* ===== PRODUCTS ===== */
const data=[
{id:1,n:"Chicken Bowl",p:10,img:"https://images.unsplash.com/photo-1604908177522-0404f2e7f0d2"},
{id:2,n:"Burger",p:11,img:"https://images.unsplash.com/photo-1550547660-d9450f859349"},
{id:3,n:"Pizza",p:12,img:"https://images.unsplash.com/photo-1548365328-8b849e7f0b1f"},
{id:4,n:"Salad",p:8,img:"https://images.unsplash.com/photo-1551892374-ecf8754cf8b0"},
{id:5,n:"Ice Coffee",p:5,img:"https://images.unsplash.com/photo-1511920170033-f8396924c348"},
{id:6,n:"Protein Shake",p:7,img:"https://images.unsplash.com/photo-1579722821273-0f6c7d44362f"},
{id:7,n:"Steak",p:15,img:"https://images.unsplash.com/photo-1558030006-450675393462"},
{id:8,n:"Fruit Bowl",p:8,img:"https://images.unsplash.com/photo-1610832958506-aa56368176cf"},
{id:9,n:"Sushi",p:12,img:"https://images.unsplash.com/photo-1562158070-3c5b2b8c6f6c"},
{id:10,n:"Pancakes",p:8,img:"https://images.unsplash.com/photo-1528207776546-365bb710ee93"},
];

let cart=[];

/* ===== RENDER ===== */
const list=document.getElementById("list");

function render(){
list.innerHTML=data.map(x=>`
<div class="card">
<img src="${x.img}">
<div class="content">
<div class="title">${x.n}</div>
<div class="price">$${x.p}</div>
<button class="add" onclick="add(${x.id})">+ Add to Cart</button>
</div>
</div>
`).join("")
}
render();

/* ===== ADD TO CART ===== */
function add(id){
let item=data.find(x=>x.id===id);

let exist=cart.find(x=>x.id===id);
if(exist){
exist.q++;
}else{
cart.push({...item,q:1});
}
update();
}

/* ===== UPDATE CART ===== */
function update(){
document.getElementById("count").textContent =
cart.reduce((a,b)=>a+b.q,0);

document.getElementById("total").textContent =
cart.reduce((a,b)=>a+b.p*b.q,0);
}

/* ===== CHECKOUT ===== */
function checkout(){
if(cart.length===0){
alert("Cart empty ❌");
return;
}

localStorage.setItem("cart",JSON.stringify(cart));
window.location.href="https://nightfallx-owner.github.io/nightfallteam01github.io/pay.html";
}

</script>

</body>
</html>
