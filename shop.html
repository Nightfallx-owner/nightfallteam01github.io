<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BZA Daily Healthy Delivery</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#f6f7f8;color:#111}
header{position:sticky;top:0;background:#fff;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;box-shadow:0 4px 12px rgba(0,0,0,.08);z-index:10}
.brand{font-weight:800;font-size:26px;color:#2e7d32}
.search{flex:1;margin:0 20px}
.search input{width:100%;padding:12px 14px;border:1px solid #ddd;border-radius:14px}
.cartBtn{background:#2e7d32;color:#fff;border:none;padding:12px 18px;border-radius:14px;cursor:pointer}
.hero{padding:32px;display:grid;grid-template-columns:2fr 1fr;gap:20px}
.banner{background:linear-gradient(135deg,#2e7d32,#66bb6a);color:#fff;padding:36px;border-radius:28px}
.banner h1{font-size:44px;margin-bottom:10px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;padding:0 32px 32px}
.card{background:#fff;border-radius:22px;padding:16px;box-shadow:0 8px 18px rgba(0,0,0,.06)}
.img{height:140px;border-radius:18px;background:linear-gradient(135deg,#dcedc8,#a5d6a7);display:flex;align-items:center;justify-content:center;font-size:52px}
.title{font-weight:700;margin:12px 0}
.row{display:flex;justify-content:space-between;align-items:center;margin-top:10px}
.price{font-weight:800}
.add{border:none;background:#111;color:#fff;padding:10px 14px;border-radius:12px;cursor:pointer}
.drawer{position:fixed;right:-420px;top:0;width:400px;max-width:100%;height:100%;background:#fff;box-shadow:-8px 0 20px rgba(0,0,0,.12);transition:.3s;padding:20px;z-index:20;overflow:auto}
.drawer.open{right:0}
.item{display:flex;justify-content:space-between;gap:10px;padding:12px 0;border-bottom:1px solid #eee}
.qty button{width:28px;height:28px;border:none;border-radius:8px;cursor:pointer}
.checkout{margin-top:16px;width:100%;padding:14px;border:none;background:#2e7d32;color:#fff;border-radius:14px;font-weight:700;cursor:pointer}
.muted{color:#666;font-size:14px}
.badge{display:inline-block;background:#fff;color:#2e7d32;padding:6px 10px;border-radius:999px;font-weight:700;margin-bottom:12px}
@media(max-width:900px){.hero{grid-template-columns:1fr}.search{display:none}}
</style>
</head>

<body>

<header>
<div class="brand">BZA Food</div>
<div class="search"><input id="search" placeholder="Search healthy meals..."></div>
<button class="cartBtn" onclick="toggleCart()">Cart (<span id="count">0</span>)</button>
</header>

<section class="hero">
<div class="banner">
<div class="badge">20 min delivery</div>
<h1>Healthy food at your door</h1>
<p>Fresh bowls, smoothies, protein meals and fast delivery.</p>
</div>

<div class="card">
<h3>Your Address</h3>
<p class="muted">Tashkent, Uzbekistan</p><br>
<h3>Promo</h3>
<p class="muted">Use code BZA10 for 10% off</p>
</div>
</section>

<section class="cards" id="products"></section>

<aside class="drawer" id="drawer">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3 style="margin-top:14px">Total: $<span id="total">0</span></h3>
<button class="checkout" onclick="checkout()">Checkout</button>
</aside>

<script>

const data = [
{id:1,n:'Green Bowl',p:8,e:'🥗'},
{id:2,n:'Berry Smoothie',p:6,e:'🥤'},
{id:3,n:'Protein Box',p:11,e:'🍱'},
{id:4,n:'Fruit Mix',p:7,e:'🍓'},
{id:5,n:'Chicken Fit',p:12,e:'🍗'},
{id:6,n:'Avocado Toast',p:9,e:'🥑'},

{id:7,n:'Mango Smoothie',p:6,e:'🥭'},
{id:8,n:'Iced Coffee',p:5,e:'☕'},
{id:9,n:'Lemon Water',p:4,e:'🍋'},
{id:10,n:'Protein Shake',p:7,e:'🥛'},
{id:11,n:'Vegan Salad',p:8,e:'🥗'},
{id:12,n:'Oatmeal Bowl',p:6,e:'🥣'},
{id:13,n:'Grilled Salmon',p:14,e:'🐟'},
{id:14,n:'Beef Steak',p:15,e:'🥩'},
{id:15,n:'Banana Smoothie',p:5,e:'🍌'},
{id:16,n:'Orange Juice',p:4,e:'🍊'},
{id:17,n:'Strawberry Shake',p:6,e:'🍓'},
{id:18,n:'Natural Energy Drink',p:5,e:'⚡'},
{id:19,n:'Herbal Tea',p:3,e:'🍵'},
{id:20,n:'Chicken Wrap',p:9,e:'🌯'},
{id:21,n:'Veggie Sandwich',p:7,e:'🥪'},
{id:22,n:'Pineapple Juice',p:5,e:'🍍'},
{id:23,n:'Protein Bar',p:4,e:'🍫'},
{id:24,n:'Greek Yogurt',p:6,e:'🥛'},
{id:25,n:'Spicy Chicken Bowl',p:10,e:'🌶️🍗'},
{id:26,n:'Detox Smoothie Bowl',p:8,e:'🥝'},

// +10 NEW
{id:27,n:'Tropical Bowl',p:9,e:'🥥'},
{id:28,n:'Mint Water',p:4,e:'🍃'},
{id:29,n:'Fitness Pancakes',p:8,e:'🥞'},
{id:30,n:'Chicken Rice Bowl',p:10,e:'🍛'},
{id:31,n:'Blueberry Yogurt',p:6,e:'🫐'},
{id:32,n:'Spicy Wrap',p:9,e:'🌯'},
{id:33,n:'Energy Smoothie',p:7,e:'⚡'},
{id:34,n:'Veggie Soup',p:5,e:'🥣'},
{id:35,n:'Protein Coffee',p:6,e:'☕💪'},
{id:36,n:'Healthy Burger',p:11,e:'🍔'}
];

let cart=[];

function render(list=data){
products.innerHTML=list.map(x=>`
<div class="card">
<div class="img">${x.e}</div>
<div class="title">${x.n}</div>
<div class="muted">Fresh & healthy</div>
<div class="row">
<div class="price">$${x.p}</div>
<button class="add" onclick="add(${x.id})">Add</button>
</div>
</div>
`).join('')
}

function add(id){
let item=cart.find(i=>i.id===id);
if(item)item.q++;
else{
let p=data.find(x=>x.id===id);
cart.push({...p,q:1})
}
draw()
}

function draw(){
count.textContent=cart.reduce((a,b)=>a+b.q,0);
cartItems.innerHTML=cart.map(i=>`
<div class="item">
<div><b>${i.n}</b><div class="muted">$${i.p}</div></div>
<div class="qty">
<button onclick="chg(${i.id},-1)">-</button>
${i.q}
<button onclick="chg(${i.id},1)">+</button>
</div>
</div>
`).join('');

total.textContent=cart.reduce((a,b)=>a+b.p*b.q,0)
}

function chg(id,v){
let i=cart.find(x=>x.id===id);
if(!i)return;
i.q+=v;
cart=cart.filter(x=>x.q>0);
draw()
}

function toggleCart(){
drawer.classList.toggle('open')
}

function checkout(){
if(cart.length===0){
alert("Cart bo'sh!");
return;
}
window.location.href="https://nightfallx-owner.github.io/nightfallteam01github.io/tarck.html";
}

search.oninput=e=>{
let q=e.target.value.toLowerCase();
render(data.filter(x=>x.n.toLowerCase().includes(q)))
}

render();draw();

</script>

</body>
</html>
