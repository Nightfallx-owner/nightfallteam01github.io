<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BITE FOOD SHOP</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6f8;
overflow-x:hidden;
}

/* HEADER */
header{
position:sticky;
top:0;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
box-shadow:0 4px 15px rgba(0,0,0,.08);
z-index:1000;
}

/* LEFT BUTTONS */
.navButtons{
display:flex;
gap:10px;
}

.navButtons button{
border:none;
padding:10px 16px;
border-radius:10px;
background:#111;
color:white;
cursor:pointer;
font-weight:bold;
transition:.25s;
}

.navButtons button:hover{
background:#2e7d32;
transform:scale(1.05);
}

/* BRAND */
.brand{
font-size:22px;
font-weight:900;
color:#2e7d32;
}

/* TIME */
.timeBox{
font-size:13px;
color:#444;
text-align:right;
}

/* PRODUCTS GRID */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:18px;
padding:20px;
padding-bottom:120px;
}

/* CARD */
.card{
background:#fff;
border-radius:18px;
overflow:hidden;
box-shadow:0 6px 16px rgba(0,0,0,.08);
transition:.25s;
}

.card:hover{
transform:translateY(-5px);
box-shadow:0 12px 25px rgba(0,0,0,.15);
}

.card img{
width:100%;
height:180px;
object-fit:cover;
background:#eee;
}

/* CONTENT */
.content{
padding:14px;
}

.title{
font-size:18px;
font-weight:700;
margin-bottom:5px;
}

.price{
color:#2e7d32;
font-size:18px;
font-weight:bold;
margin-bottom:10px;
}

/* BUTTON */
.add{
width:100%;
padding:10px;
border:none;
border-radius:10px;
background:#111;
color:white;
font-weight:bold;
cursor:pointer;
transition:.25s;
}

.add:hover{
background:#2e7d32;
}

/* CART BAR */
.cartBar{
position:fixed;
bottom:0;
left:0;
width:100%;
background:#111;
color:white;
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
z-index:999;
}

.cartInfo{
display:flex;
gap:20px;
font-weight:bold;
}

.cartBtn{
background:#2e7d32;
color:white;
border:none;
padding:10px 16px;
border-radius:10px;
cursor:pointer;
font-weight:bold;
transition:.25s;
}

.cartBtn:hover{
background:#1b5e20;
}

/* MOBILE */
@media(max-width:700px){

header{
flex-direction:column;
gap:10px;
}

.cards{
grid-template-columns:1fr;
}

}

</style>
</head>

<body>

<header>

<div class="navButtons">

<button onclick="openAbout()">
About
</button>

<button onclick="openAI()">
AI
</button>

</div>

<div class="brand">
🥗 BITE FOOD SHOP
</div>

<div class="timeBox">
<div id="date"></div>
<div id="time"></div>
</div>

</header>

<!-- PRODUCTS -->
<div class="cards" id="list"></div>

<!-- CART -->
<div class="cartBar">

<div class="cartInfo">
<div>🛒 <span id="count">0</span></div>
<div>💰 $<span id="total">0</span></div>
</div>

<button class="cartBtn" onclick="checkout()">
CHECKOUT
</button>

</div>

<script>

/* ===== 40 FOODS ===== */

const data = [

{id:1,n:"Chicken Bowl",p:10,img:"https://images.unsplash.com/photo-1546069901-ba9599a7e63c?w=600"},

{id:14,n:"Fries",p:5,img:"https://images.unsplash.com/photo-1576107232684-1279f390859f?w=600"},
{id:15,n:"Milkshake",p:6,img:"https://images.unsplash.com/photo-1572490122747-3968b75cc699?w=600"},
{id:16,n:"Ice Tea",p:4,img:"https://images.unsplash.com/photo-1497534446932-c925b458314e?w=600"},

{id:33,n:"Ramen",p:11,img:"https://images.unsplash.com/photo-1617093727343-374698b1b08d?w=600"},

{id:35,n:"Soda",p:3,img:"https://images.unsplash.com/photo-1581636625402-29b2a704ef13?w=600"},
{id:36,n:"Burger XL",p:13,img:"https://images.unsplash.com/photo-1550547660-d9450f859349?w=600"},
{id:37,n:"Cheese Pasta",p:10,img:"https://images.unsplash.com/photo-1621996346565-e3dbc646d9a9?w=600"},
{id:38,n:"Fruit Mix",p:7,img:"https://images.unsplash.com/photo-1490645935967-10de6ba17061?w=600"},
{id:39,n:"Energy Bowl",p:10,img:"https://images.unsplash.com/photo-1515003197210-e0cd71810b5f?w=600"},
{id:40,n:"Healthy Bowl",p:11,img:"https://images.unsplash.com/photo-1547592180-85f173990554?w=600"}

];

let cart=[];

/* CLOCK */
function updateTime(){

let d=new Date();

document.getElementById("date").innerHTML=
d.toDateString();

document.getElementById("time").innerHTML=
d.toLocaleTimeString();

}

setInterval(updateTime,1000);
updateTime();

/* RENDER */
const list=document.getElementById("list");

function render(){

list.innerHTML=data.map(x=>`

<div class="card">

<img loading="lazy"
src="${x.img}"
onerror="this.src='https://via.placeholder.com/400x300?text=Food'">

<div class="content">

<div class="title">${x.n}</div>

<div class="price">$${x.p}</div>

<button class="add" onclick="add(${x.id})">
+ Add To Cart
</button>

</div>
</div>

`).join("");

}

render();

/* ADD TO CART */
function add(id){

let item=data.find(x=>x.id===id);

let exist=cart.find(x=>x.id===id);

if(exist){
exist.q++;
}else{
cart.push({...item,q:1});
}

updateCart();

}

/* UPDATE CART */
function updateCart(){

document.getElementById("count").innerHTML=
cart.reduce((a,b)=>a+b.q,0);

document.getElementById("total").innerHTML=
cart.reduce((a,b)=>a+b.p*b.q,0);

}

/* CHECKOUT */
function checkout(){

if(cart.length===0){

alert("Cart Empty ❌");
return;

}

localStorage.setItem("cart",JSON.stringify(cart));

window.location.href=
"https://nightfallx-owner.github.io/nightfallteam01github.io/pay.html";

}

/* TOP BUTTONS */
function openAbout(){

window.location.href=
"https://nightfallx-owner.github.io/nightfallteam01github.io/about.html";

}

function openAI(){

window.location.href=
"https://nightfallx-owner.github.io/nightfallteam01github.io/ai.html";

}

</script>

</body>
</html>
