<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BZA Food Shop</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#f6f7f8;color:#111}

header{
position:sticky;top:0;background:#fff;
display:flex;justify-content:space-between;align-items:center;
padding:15px 20px;box-shadow:0 4px 12px rgba(0,0,0,.08);z-index:10
}

.brand{font-size:22px;font-weight:800;color:#2e7d32}

.search input{
padding:10px;border-radius:10px;border:1px solid #ddd;width:250px
}

.cartBtn{
background:#2e7d32;color:#fff;padding:10px 14px;
border:none;border-radius:10px;cursor:pointer
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:15px;padding:20px
}

.card{
background:#fff;border-radius:18px;
padding:15px;box-shadow:0 5px 15px rgba(0,0,0,.08);
cursor:pointer;transition:.2s
}
.card:hover{transform:scale(1.03)}

.img{
font-size:40px;text-align:center;padding:10px 0
}

.title{font-weight:700;margin:10px 0}

.small{font-size:13px;color:#666}

.row{display:flex;justify-content:space-between;align-items:center;margin-top:10px}

.add{background:#111;color:#fff;padding:6px 10px;border:none;border-radius:8px;cursor:pointer}
.like{background:#ff4757;color:#fff;padding:6px 10px;border:none;border-radius:8px;cursor:pointer}

.drawer{
position:fixed;right:-350px;top:0;width:320px;height:100%;
background:#fff;box-shadow:-5px 0 20px rgba(0,0,0,.2);
padding:20px;transition:.3s;overflow:auto
}
.drawer.open{right:0}

.item{padding:10px 0;border-bottom:1px solid #eee}

.modal{
position:fixed;top:0;left:0;width:100%;height:100%;
background:rgba(0,0,0,.6);
display:none;justify-content:center;align-items:center
}

.box{
background:#fff;padding:20px;border-radius:15px;width:300px;text-align:center
}
</style>
</head>

<body>

<header>
<div class="brand">🥗 BZA FOOD</div>

<div class="search">
<input id="search" placeholder="Search food...">
</div>

<button class="cartBtn" onclick="toggleCart()">Cart (<span id="count">0</span>)</button>
</header>

<!-- PRODUCTS -->
<div class="cards" id="products"></div>

<!-- CART -->
<div class="drawer" id="drawer">
<h2>🛒 Cart</h2>
<div id="cartItems"></div>
<h3>Total: $<span id="total">0</span></h3>
<button onclick="checkout()" class="cartBtn" style="width:100%;margin-top:10px">Checkout</button>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="box">
<div id="mEmoji" style="font-size:50px"></div>
<h2 id="mName"></h2>
<p class="small" id="mDesc"></p>
<p>🔥 <span id="mCal"></span> kcal</p>
<p>⭐ <span id="mRate"></span></p>
<h3>$<span id="mPrice"></span></h3>
<br>
<button onclick="modal.style.display='none'" class="cartBtn">Close</button>
</div>
</div>

let cart=[];

/* ===== RENDER ===== */
function render(list=data){
products.innerHTML=list.map(x=>`
<div class="card" onclick="openModal(${x.id})">
<div class="img">${x.e}</div>
<div class="title">${x.n}</div>
<div class="small">🔥 ${x.cal} kcal ⭐ ${x.rate}</div>

<div class="row">
<div class="price">$${x.p}</div>
<button class="add" onclick="event.stopPropagation();add(${x.id})">Add</button>
</div>
</div>
`).join('')
}

/* ===== CART ===== */
function add(id){
let i=cart.find(x=>x.id===id);
if(i)i.q++;
else{
let p=data.find(x=>x.id===id);
cart.push({...p,q:1});
}
draw();
}

function draw(){
count.textContent=cart.reduce((a,b)=>a+b.q,0);
cartItems.innerHTML=cart.map(i=>`
<div class="item">${i.n} x${i.q}</div>
`).join('');
total.textContent=cart.reduce((a,b)=>a+b.p*b.q,0);
}

/* ===== MODAL ===== */
function openModal(id){
let i=data.find(x=>x.id===id);
mEmoji.textContent=i.e;
mName.textContent=i.n;
mDesc.textContent=i.d;
mCal.textContent=i.cal;
mRate.textContent=i.rate;
mPrice.textContent=i.p;
modal.style.display="flex";
}

/* ===== CART TOGGLE ===== */
function toggleCart(){
drawer.classList.toggle("open");
}

/* ===== CHECKOUT ===== */
function checkout(){
window.location.href="https://nightfallx-owner.github.io/nightfallteam01github.io/tarck.html";
}

/* ===== SEARCH ===== */
search.oninput=e=>{
let q=e.target.value.toLowerCase();
render(data.filter(x=>x.n.toLowerCase().includes(q)))
}

render();draw();

</script>
