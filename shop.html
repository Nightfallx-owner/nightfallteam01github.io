<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BITE SHOP v12</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
font-family:Arial;
background:#f4f6f8;
}

/* HEADER */
header{
position:sticky;
top:0;
background:#fff;
display:flex;
justify-content:space-between;
align-items:center;
padding:12px 15px;
box-shadow:0 4px 12px rgba(0,0,0,.08);
z-index:10;
}

.brand{
font-weight:800;
color:#2e7d32;
}

.timeBox{
font-size:13px;
color:#444;
text-align:right;
}

/* GRID */
.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
gap:15px;
padding:20px;
}

.card{
background:#fff;
border-radius:15px;
overflow:hidden;
box-shadow:0 6px 15px rgba(0,0,0,.08);
transition:.2s;
}

.card:hover{
transform:scale(1.03);
}

img{
width:100%;
height:140px;
object-fit:cover;
background:#eee;
}

.content{padding:10px}

.title{font-weight:700}

.price{color:#2e7d32;font-weight:bold;margin:5px 0}

button{
border:none;
padding:8px;
border-radius:8px;
cursor:pointer;
width:100%;
}

.add{
background:#111;
color:#fff;
margin-top:5px;
}

/* CART */
.cartBar{
position:fixed;
bottom:0;
width:100%;
background:#111;
color:#fff;
display:flex;
justify-content:space-between;
padding:12px;
align-items:center;
}

.cartBtn{
background:#2e7d32;
color:#fff;
padding:8px 12px;
border:none;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<header>
<div class="brand">🥗 BITE FOOD SHOP</div>

<div class="timeBox">
<div id="date"></div>
<div id="time"></div>
</div>
</header>

<div class="cards" id="list"></div>

<!-- CART -->
<div class="cartBar">
<div>🛒 <span id="count">0</span></div>
<div>💰 $<span id="total">0</span></div>
<button class="cartBtn" onclick="checkout()">CHECKOUT</button>
</div>

<script>

/* ===== FIXED 40 PRODUCTS (WORKING IMAGES) ===== */
const data = [

{id:37,n:"Cheese Pasta",p:10,img:"https://images.unsplash.com/photo-1555949258-eb67b1ef0ceb"},
{id:38,n:"Fruit Mix",p:7,img:"https://images.unsplash.com/photo-1610832958506-aa56368176cf"},
{id:39,n:"Energy Bowl",p:10,img:"https://images.unsplash.com/photo-1550989460-0adf9ea622e2"},
{id:40,n:"Healthy Bowl",p:11,img:"https://images.unsplash.com/photo-1604908177522-0404f2e7f0d2"},
];

let cart=[];

/* ===== CLOCK ===== */
function updateTime(){
let d=new Date();
document.getElementById("date").textContent=
d.toDateString();

document.getElementById("time").textContent=
d.toLocaleTimeString();
}
setInterval(updateTime,1000);
updateTime();

/* ===== RENDER ===== */
const list=document.getElementById("list");

function render(){
list.innerHTML=data.map(x=>`
<div class="card">
<img src="${x.img}" onerror="this.src='https://via.placeholder.com/400x300?text=Food'">
<div class="content">
<div class="title">${x.n}</div>
<div class="price">$${x.p}</div>
<button class="add" onclick="add(${x.id})">+ Add</button>
</div>
</div>
`).join("")
}
render();

/* ===== CART ===== */
function add(id){
let item=data.find(x=>x.id===id);
let exist=cart.find(x=>x.id===id);

if(exist) exist.q++;
else cart.push({...item,q:1});

update();
}

function update(){
document.getElementById("count").textContent=
cart.reduce((a,b)=>a+b.q,0);

document.getElementById("total").textContent=
cart.reduce((a,b)=>a+b.p*b.q,0);
}

/* ===== CHECKOUT ===== */
function checkout(){
if(cart.length===0){
alert("Cart empty ❌");
return;
}

localStorage.setItem("cart",JSON.stringify(cart));
window.location.href="https://nightfallx-owner.github.io/nightfallteam01github.io/pay.html";
}

</script>

</body>
</html>
