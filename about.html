<title>About BSJ</title>

<style>

body{
font-family:Arial;
text-align:center;
padding:60px;
background:#f3fff5;
}

/* CARD */
.card{
background:white;
display:inline-block;
padding:30px;
border-radius:15px;
border:2px solid #22c55e;
box-shadow:0 10px 20px rgba(0,0,0,.1);
max-width:420px;
}

/* 🔥 LOGO CENTER */
.logo{
width:100px;
height:100px;
border-radius:20px;
margin:0 auto 15px;
display:block;
box-shadow:0 0 20px #22c55e;
animation:float 3s infinite;
}

@keyframes float{
0%,100%{transform:translateY(0);}
50%{transform:translateY(-10px);}
}

h1{
color:#2e7d32;
margin-bottom:10px;
}

p{
line-height:1.6;
color:#333;
}

a{
display:inline-block;
margin-top:20px;
text-decoration:none;
background:#22c55e;
color:white;
padding:10px 15px;
border-radius:8px;
}

a:hover{
background:#15803d;
}

</style>

</head>
