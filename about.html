<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Nightfall Shop</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        .container {
            width: 100%;
            max-width: 400px;
        }
        /* Chegirma va menyu tugmalari */
        .menu-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
            margin: 20px 0;
        }
        .menu-item {
            background: #1a1a1a;
            padding: 10px;
            text-align: center;
            border-radius: 12px;
            font-size: 12px;
        }
        /* Animatsiyali tugma */
        .cta-button {
            width: 100%;
            padding: 15px;
            background: linear-gradient(45deg, #ff0000, #8b0000);
            border: none;
            color: white;
            font-weight: bold;
            border-radius: 15px;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 20px;
        }
        .cta-button:hover {
            transform: scale(1.05);
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
        }
        .promo-card {
            background: #151515;
            padding: 15px;
            border-radius: 15px;
            margin-top: 10px;
            border-left: 4px solid red;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Nightfall Market</h2>
    
    <div class="menu-grid">
        <div class="menu-item">%<br>Chegirma</div>
        <div class="menu-item">♥<br>Saralangan</div>
        <div class="menu-item">↻<br>Tarix</div>
        <div class="menu-item">▣<br>QR</div>
    </div>

    <div class="promo-card">
        <h3>Aksiya!</h3>
        <p>Barcha mahsulotlarga 20% chegirma.</p>
    </div>

    <!-- Yo'naltiruvchi tugma -->
    <button class="cta-button" onclick="window.location.href='https://Nightfallx.site.je'">
        DO'KONGA O'TISH
    </button>
</div>

</body>
</html>
