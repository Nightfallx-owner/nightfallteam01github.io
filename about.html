<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightfall Projects</title>
    <style>
        :root { --dark-red: #8B0000; --deep-black: #050505; --accent: #ff4d4d; }
        
        body { 
            background: var(--deep-black); color: white; 
            font-family: 'Arial', sans-serif; text-align: center; 
            margin: 0; padding: 20px; overflow-x: hidden;
        }

        /* Qalqon (Shield) */
        .shield {
            width: 130px; height: 150px;
            background: var(--dark-red);
            margin: 30px auto;
            clip-path: polygon(50% 100%, 0 0, 100% 0, 100% 70%, 50% 100%);
            border: 3px solid var(--accent);
            box-shadow: 0 0 25px var(--dark-red);
            transition: 0.5s;
        }
        .shield:hover { transform: scale(1.05); }

        h1 { color: var(--accent); text-transform: uppercase; letter-spacing: 3px; }

        /* Tugmalar bloki */
        .btn-container { display: flex; flex-direction: column; align-items: center; gap: 15px; margin-top: 20px; }

        .btn {
            width: 250px; padding: 15px;
            background: #1a1a1a; color: white;
            text-decoration: none; border: 1px solid var(--dark-red);
            border-radius: 5px; font-weight: bold;
            transition: 0.3s; cursor: pointer;
        }
        .btn:hover { background: var(--dark-red); transform: scale(1.05); }

        .main-btn { background: var(--dark-red); animation: pulse 2s infinite; }
        
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(139, 0, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(139, 0, 0, 0); }
        }

        .social-box { margin-top: 40px; border-top: 1px solid #333; padding-top: 20px; }
    </style>
</head>
<body>

    <div class="shield"></div>
    <h1>NIGHTFALL TEAM</h1>

    <div class="btn-container">
        <!-- Asosiy Shop tugmasi -->
        <a href="https://nightfallx-owner.github.io/nightfallteam01github.io/shop.html" class="btn main-btn">FOOD MARKET</a>
        
        <!-- Boshqa tugmalar -->
        <button class="btn">Market</button>
        <button class="btn">Kiyim do'kon</button>
        <button class="btn">Xo'z mag</button>
    </div>

    <div class="social-box">
        <h3>Aloqa uchun</h3>
        <div class="btn-container">
            <a href="https://ahmedoviskandar123-cpu.github.io/Site/" class="btn">Rasmiy Sayt</a>
            <a href="https://t.me/Nightfallx_offical" class="btn">Telegram: @Nightfallx_offical</a>
            <a href="https://youtube.com/@Nightfallteam_owner" class="btn">YouTube: Nightfallteam_owner</a>
        </div>
    </div>

    <!-- Musiqa qismi -->
    <audio id="bg-music" loop>
        <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
    </audio>

    <script>
        // Musiqani ishga tushirish funksiyasi
        function playMusic() {
            const audio = document.getElementById('bg-music');
            audio.play();
        }

        // Sahifada istalgan joyni bosganda musiqa chaladi
        document.body.addEventListener('click', playMusic, { once: true });
    </script>

</body>
</html>
