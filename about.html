<!DOCTYPE html>
<html lang="uz">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nightfall Team | About</title>

<style>
*{margin:0;padding:0;box-sizing:border-box}

body{
 background:#000;
 color:#ddd;
 font-family:Consolas, monospace;
 overflow-x:hidden;
}

/* CANVAS */
canvas{
 position:fixed;
 inset:0;
 z-index:-1;
}

/* TOP */
.top{
 position:fixed;
 top:0;
 width:100%;
 padding:12px 25px;
 display:flex;
 justify-content:space-between;
 align-items:center;
 background:rgba(0,0,0,.9);
 border-bottom:1px solid #111;
}

.top a{
 color:#aaa;
 text-decoration:none;
 transition:.3s;
}
.top a:hover{
 color:#fff;
}

/* CONTENT */
.content{
 max-width:850px;
 margin:100px auto 50px;
 padding:0 20px;
 line-height:1.8;
 font-size:15px;
}

/* TEXT */
h1{
 margin-bottom:20px;
 font-size:26px;
 color:#fff;
}

h2{
 margin:25px 0 10px;
 color:#ccc;
 font-size:16px;
}

ul{margin-left:20px;}
ul li{margin-bottom:8px;}

/* LINKS */
a{
 color:#ccc;
 text-decoration:none;
}
a:hover{color:#fff}

/* CARD */
.card{
 background:rgba(255,255,255,0.02);
 border:1px solid rgba(255,255,255,0.05);
 padding:18px;
 border-radius:10px;
 margin-bottom:15px;
 transition:.3s;
}
.card:hover{
 transform:translateY(-4px);
 box-shadow:0 0 20px rgba(255,255,255,0.05);
}

/* TYPING */
.typing{
 border-right:2px solid #888;
 white-space:nowrap;
 overflow:hidden;
 display:inline-block;
 animation:blink .7s infinite;
}

@keyframes blink{
 50%{border-color:transparent;}
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="top">
 <a href="#">⬅ Back</a>
 <div>Nightfall</div>
</div>

<div class="content">

 <h1><span id="title" class="typing"></span></h1>

 <div class="card">
  <p id="text"></p>
 </div>

 <div class="card">
  <h2>Skills</h2>
  <ul>
   <li>Telegram Bot</li>
   <li>Cyber Security</li>
   <li>Web Development</li>
   <li>Bug Bounty</li>
  </ul>
 </div>

 <div class="card">
  <h2>Team</h2>
  <ul>
   <li>Nightfall Team — 2024</li>
   <li>Active since 2025</li>
   <li>Owner: Nightfallx</li>
   <li>Email: <a href="mailto:nightfallteam02@gmail.com">nightfallteam02@gmail.com</a></li>
   <li>Telegram: <a href="#">Channel</a></li>
  </ul>
 </div>

</div>

<script>

/* ===== BLACK SMOKE ===== */
const c = document.getElementById("bg");
const ctx = c.getContext("2d");

let w = c.width = innerWidth;
let h = c.height = innerHeight;

let parts = [];

function createSmoke(x,y){
 for(let i=0;i<3;i++){
  parts.push({
   x:x,
   y:y,
   size: Math.random()*25+10,
   alpha: 0.08,
   vx:(Math.random()-.5)*0.6,
   vy:(Math.random()-.5)*0.6 - 0.2,
   life: 120
  });
 }
}

onmousemove = e => createSmoke(e.clientX,e.clientY);

setInterval(()=>{
 createSmoke(Math.random()*w,h);
},250);

function draw(){
 ctx.fillStyle="rgba(0,0,0,0.25)";
 ctx.fillRect(0,0,w,h);

 parts.forEach((p,i)=>{
  p.x+=p.vx;
  p.y+=p.vy;
  p.life--;
  p.alpha-=0.0008;

  let g=ctx.createRadialGradient(p.x,p.y,0,p.x,p.y,p.size);
  g.addColorStop(0,`rgba(255,255,255,${p.alpha})`);
  g.addColorStop(1,"rgba(0,0,0,0)");

  ctx.beginPath();
  ctx.fillStyle=g;
  ctx.arc(p.x,p.y,p.size,0,Math.PI*2);
  ctx.fill();

  ctx.shadowBlur=20;
  ctx.shadowColor="rgba(255,255,255,0.2)";

  if(p.life<=0) parts.splice(i,1);
 });

 requestAnimationFrame(draw);
}
draw();

onresize=()=>{
 w=c.width=innerWidth;
 h=c.height=innerHeight;
};

/* TITLE */
const t="Nightfall Team";
let ti=0;
function typeT(){
 if(ti<t.length){
  document.getElementById("title").innerHTML+=t.charAt(ti);
  ti++;
  setTimeout(typeT,70);
 }
}
typeT();

/* TEXT */
const txt="Cyber security va real skill o‘rganish platformasi.";
let i=0;
function type(){
 if(i<txt.length){
  document.getElementById("text").innerHTML+=txt.charAt(i);
  i++;
  setTimeout(type,20);
 }
}
type();

</script>

</body>
</html>
