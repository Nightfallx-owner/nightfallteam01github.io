<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Nightfall Projects</title>
    <style>
        :root { --dark-red: #8B0000; --deep-black: #050505; }
        
        body { 
            background: var(--deep-black); color: white; 
            font-family: 'Segoe UI', sans-serif; text-align: center; 
            margin: 0; padding: 0; overflow-x: hidden;
        }

        .container { padding: 50px 20px; }

        /* Qalqon (Shield) */
        .shield {
            width: 140px; height: 160px;
            background: var(--dark-red);
            margin: 0 auto 30px;
            clip-path: polygon(50% 100%, 0 0, 100% 0, 100% 70%, 50% 100%);
            display: flex; align-items: center; justify-content: center;
            border: 3px solid #ff4d4d;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.6);
            transition: 0.5s;
        }

        h1 { color: #ff4d4d; text-transform: uppercase; letter-spacing: 5px; }

        /* Asosiy tugma */
        .main-btn {
            display: inline-block; padding: 20px 50px;
            background: var(--dark-red); color: white;
            text-decoration: none; border-radius: 8px;
            font-size: 1.2rem; font-weight: bold;
            border: 2px solid #ff4d4d;
            animation: glow 1.5s infinite alternate;
        }

        @keyframes glow {
            from { box-shadow: 0 0 5px #8B0000; }
            to { box-shadow: 0 0 20px #ff4d4d; }
        }

        /* Aloqa bo'limi */
        .social-links { margin-top: 40px; }
        .social-btn {
            display: inline-block; padding: 10px 20px;
            margin: 5px; background: #1a1a1a; color: white;
            text-decoration: none; border-radius: 5px;
            border-bottom: 2px solid var(--dark-red);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="shield">EMBLEM</div>
    <h1>NIGHTFALL PROJECTS</h1>
    
    <a href="https://nightfallx-owner.github.io/nightfallteam01github.io/shop.html" class="main-btn">FOOD MARKET</a>
    
    <div class="social-links">
        <a href="https://t.me/Nightfallx_offical" class="social-btn">Telegram: @Nightfallx_offical</a>
        <a href="https://youtube.com/@Nightfallteam_owner" class="social-btn">YouTube: Nightfallteam_owner</a>
        <a href="https://ahmedoviskandar123-cpu.github.io/Site/" class="social-btn">Aloqa Uchun</a>
    </div>
</div>

<!-- Musiqa qismi: URL ga Phonk musiqa qo'yildi -->
<audio id="bg-music" loop>
    <source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mpeg">
</audio>

<script>
    // Musiqa foydalanuvchi saytga kirganda 1 marta bosilishi bilan ishga tushadi
    window.addEventListener('click', () => {
        document.getElementById('bg-music').play();
    }, { once: true });
</script>

</body>
</html>
