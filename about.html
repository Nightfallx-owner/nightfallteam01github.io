<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <title>Nightfall Team | Layout</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; margin: 0; padding: 20px; text-align: center; }
        
        .shield { width: 100px; height: 120px; background: #8B0000; clip-path: polygon(50% 100%, 0 0, 100% 0, 100% 70%, 50% 100%); margin: 20px auto; border: 2px solid #ff4d4d; }

        /* Grid tizimi: chap, orta, ong */
        .grid-container { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
            max-width: 800px; 
            margin: 40px auto; 
        }

        .btn { 
            padding: 15px; background: #1a1a1a; border: 1px solid #8B0000; 
            color: white; text-decoration: none; border-radius: 8px;
            transition: 0.5s; cursor: pointer; display: block;
        }

        /* Animatsiyalar */
        .btn:hover { background: #8B0000; transform: translateY(-10px) scale(1.05); box-shadow: 0 10px 20px #8B0000; }
        
        .main-btn { grid-column: span 3; background: #8B0000; font-weight: bold; animation: glow 2s infinite; }
        
        @keyframes glow { 0%, 100% { box-shadow: 0 0 10px #8B0000; } 50% { box-shadow: 0 0 30px #ff4d4d; } }
    </style>
</head>
<body>

    <div class="shield"></div>
    <h1>NIGHTFALL TEAM</h1>

    <div class="grid-container">
        <!-- Asosiy tugma tepada (butun qatorni egallaydi) -->
        <a href="https://nightfallx-owner.github.io/nightfallteam01github.io/shop.html" class="btn main-btn">FOOD MARKET</a>
        
        <!-- Chap, Orta, Ong -->
        <button class="btn">Market</button>
        <button class="btn">Kiyim do'kon</button>
        <button class="btn">Xo'z mag</button>
    </div>

    <!-- Aloqa qismi -->
    <div style="margin-top: 50px;">
        <h3>ALOQA</h3>
        <div class="grid-container" style="max-width: 600px;">
            <a href="https://ahmedoviskandar123-cpu.github.io/Site/" class="btn">Sayt</a>
            <a href="https://t.me/Nightfallx_offical" class="btn">Telegram</a>
            <a href="https://youtube.com/@Nightfallteam_owner" class="btn">YouTube</a>
        </div>
    </div>

    <audio id="piano" loop>
        <source src="https://www.dl.dropboxusercontent.com/s/7i8t9j8k765/dark-piano.mp3" type="audio/mpeg">
    </audio>

    <script>
        document.body.addEventListener('click', () => { document.getElementById('piano').play(); }, { once: true });
    </script>
</body>
</html>
