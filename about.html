<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nightfall Redirect</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050505;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'Segoe UI', sans-serif;
        }

        #starfield {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 20px;
            width: 90%;
            max-width: 500px;
        }

        .notice-box {
            border: 2px solid #ff0000;
            padding: 25px;
            background: rgba(20, 0, 0, 0.8);
            border-radius: 20px;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.3);
            backdrop-filter: blur(5px);
        }

        h1 { color: #ff3333; font-size: 24px; margin-bottom: 15px; text-transform: uppercase; }
        p { color: #ccc; margin-bottom: 20px; }

        .cta-button {
            width: 100%;
            padding: 18px;
            font-size: 18px;
            background: linear-gradient(45deg, #cc0000, #ff4444);
            color: white;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(255, 0, 0, 0.4);
            font-weight: bold;
        }

        .cta-button:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(255, 0, 0, 0.6);
        }

        /* Mobil qurilmalar uchun */
        @media (max-width: 600px) {
            h1 { font-size: 20px; }
            .notice-box { padding: 15px; }
        }
    </style>
</head>
<body>

    <canvas id="starfield"></canvas>

    <div class="container">
        <div class="notice-box">
            <h1>SAYT KO'CHIRILDI!</h1>
            <p>To'liq ma'lumot olish uchun quyidagi tugmani bosing:</p>
            <button class="cta-button" onclick="window.location.href='https://Nightfallx.site.je'">
                O'TISH
            </button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('starfield');
        const ctx = canvas.getContext('2d');
        
        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.onresize = resize;
        resize();

        let stars = [];
        for(let i=0; i<150; i++) {
            stars.push({
                x: Math.random()*canvas.width, 
                y: Math.random()*canvas.height, 
                size: Math.random()*1.5,
                speed: Math.random()*0.5 + 0.2
            });
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "white";
            stars.forEach(s => {
                ctx.beginPath();
                ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
                ctx.fill();
                s.x += s.speed; 
                if(s.x > canvas.width) s.x = 0;
            });
            requestAnimationFrame(draw);
        }
        draw();
    </script>
</body>
</html>
