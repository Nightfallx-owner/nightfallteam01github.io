<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Features</title>
<style>
body{font-family:Arial;margin:0}
section{padding:20px}
input,textarea{width:100%;padding:10px;margin:6px 0}
button{background:#2e7d32;color:#fff;border:none;padding:10px;border-radius:10px;width:100%}
.box{background:#f5f5f5;padding:15px;border-radius:12px;margin-top:10px}
video{width:100%;border-radius:10px}
</style>
</head>
<body>

<section>
<h2>Order Form</h2>
<input placeholder="Name">
<input placeholder="Phone">
<textarea placeholder="Address"></textarea>
<button onclick="alert('Order sent 🚀')">Place Order</button>
</section>

<section>
<h2>BMI Analyzer</h2>
<input id="w" placeholder="Weight (kg)">
<input id="h" placeholder="Height (cm)">
<button onclick="calc()">Calculate</button>
<div class="box" id="res"></div>
</section>

<section>
<h2>Voice Command</h2>
<button onclick="voice()">Start Voice</button>
</section>

<section>
<h2>Camera</h2>
<video id="v" autoplay></video>
<button onclick="cam()">Open Camera</button>
</section>

<script>
function calc(){
let w=document.getElementById("w").value;
let h=document.getElementById("h").value/100;
let bmi=(w/(h*h)).toFixed(1);
document.getElementById("res").innerText="BMI: "+bmi;
}

function voice(){
let r=new (window.SpeechRecognition||window.webkitSpeechRecognition)();
r.start();
r.onresult=e=>alert(e.results[0][0].transcript);
}

function cam(){
navigator.mediaDevices.getUserMedia({video:true})
.then(s=>document.getElementById("v").srcObject=s);
}
</script>

</body>
</html>
